<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forca Digital: IA e Desinformação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>Forca da Cidadania Digital</h1>
            <p class="subtitle">O Impacto das Deepfakes e da Desinformação na Sociedade</p>
        </header>

        <p class="tip">Dica contextual: <span id="tip-text">...</span></p>
        
        <div class="gallows-container">
            <svg height="220" width="200" class="gallows">
                <!-- Estrutura da forca -->
                <line x1="20" y1="200" x2="100" y2="200" class="base" />
                <line x1="60" y1="20" x2="60" y2="200" class="pole" />
                <line x1="60" y1="20" x2="140" y2="20" class="beam" />
                <line x1="140" y1="20" x2="140" y2="50" class="rope" />
                <!-- Partes do corpo -->
                <circle cx="140" cy="70" r="18" id="head" class="body-part" />
                <line x1="140" y1="88" x2="140" y2="140" id="body" class="body-part" />
                <line x1="140" y1="100" x2="110" y2="120" id="left-arm" class="body-part" />
                <line x1="140" y1="100" x2="170" y2="120" id="right-arm" class="body-part" />
                <line x1="140" y1="140" x2="110" y2="180" id="left-leg" class="body-part" />
                <line x1="140" y1="140" x2="170" y2="180" id="right-leg" class="body-part" />
            </svg>
        </div>

        <div class="word-container" id="word-display"></div>
        <div class="keyboard" id="keyboard"></div>
        
        <div class="score-board">
            Vidas restantes: <span id="attempts">6</span>
        </div>

        <button id="reset-btn" class="btn">Próximo Conceito</button>
    </div>

    <!-- Modal de Fim de Jogo e Informação Educativa -->
    <div class="modal" id="result-modal">
        <div class="modal-content">
            <h2 id="modal-title">Resultado</h2>
            <p id="modal-message"></p>
            
            <!-- Bloco de Impacto Social / Conteúdo Educativo -->
            <div id="educational-info" class="edu-box">
                <h3>💡 Impacto na Sociedade:</h3>
                <p id="edu-text"></p>
            </div>

            <button id="modal-btn" class="btn">Continuar Aprendendo</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
